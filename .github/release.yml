# GitHub's native auto-generated release notes config.
# https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes
#
# Triggered by `gh release create --generate-notes` (see .github/workflows/release.yml).
# Groups merged PRs by their PR labels; if you commit directly to main without
# PRs, GitHub falls back to listing commits by title — which works fine with
# our conventional-commit style (feat:, fix:, docs:, …).
changelog:
  exclude:
    labels:
      - skip-changelog
      - duplicate
      - invalid
      - wontfix
    authors:
      - dependabot

  categories:
    - title: Breaking changes
      labels:
        - breaking-change
        - "type: breaking"

    - title: Features
      labels:
        - enhancement
        - feature
        - "type: feat"

    - title: Fixes
      labels:
        - bug
        - "type: fix"

    - title: Security
      labels:
        - security

    - title: Documentation
      labels:
        - documentation
        - "type: docs"

    - title: CI & Build
      labels:
        - ci
        - build
        - "type: ci"
        - "type: build"

    - title: Other changes
      labels:
        - "*"
