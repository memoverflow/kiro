name: release

# Trigger: push a SemVer tag (`v0.4.0`, `v1.2.3`, `v1.0.0-rc1`, …).
# The release is created from the tag's commit, NOT from HEAD of main. Tag
# whatever commit you want to ship from.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # needed to create the Release + upload assets

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the auto-generated notes can diff against the
          # previous tag.
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # fetch-singbox.sh downloads the sing-box binaries for each target.
      # Kept as a plain shell script so local dev (scripts/build-dist.sh) and
      # CI use the exact same fetch path — no drift between environments.
      - name: Fetch embedded sing-box binaries
        run: ./scripts/fetch-singbox.sh

      - name: Build darwin/arm64
        env:
          GOOS: darwin
          GOARCH: arm64
        run: go build -ldflags="-s -w" -o dist/kiroctl-darwin-arm64 ./cmd/kiroctl

      - name: Build windows/amd64
        env:
          GOOS: windows
          GOARCH: amd64
        run: go build -ldflags="-s -w" -o dist/kiroctl-windows-amd64.exe ./cmd/kiroctl

      # Published alongside the binaries so downstream users can verify what
      # they downloaded. A single combined `checksums.txt` matches the format
      # curl/scripts expect (sha256sum -c).
      - name: Generate SHA-256 checksums
        run: |
          cd dist
          sha256sum kiroctl-darwin-arm64 kiroctl-windows-amd64.exe > checksums.txt
          cat checksums.txt

      # Build release notes from git log between the previous tag and this
      # one. GitHub's --generate-notes only groups merged PRs, which is empty
      # for direct push-to-main workflows. Using conventional-commit prefixes
      # directly from git log gives useful grouping regardless of PR usage.
      - name: Generate release notes
        id: notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          PREV_TAG="$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || echo '')"
          if [[ -z "$PREV_TAG" ]]; then
            RANGE="$TAG"
          else
            RANGE="$PREV_TAG..$TAG"
          fi

          # Helper: pull commit subjects matching a prefix regex.
          group() {
            local pattern="$1"
            git log --no-merges --pretty=format:'- %s (%h)' "$RANGE" | grep -E "$pattern" || true
          }

          {
            echo "## Install"
            echo
            echo "### macOS (Apple Silicon)"
            echo
            echo '```bash'
            echo "curl -LO https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/kiroctl-darwin-arm64"
            echo 'chmod +x kiroctl-darwin-arm64'
            echo 'xattr -d com.apple.quarantine kiroctl-darwin-arm64 2>/dev/null || true'
            echo './kiroctl-darwin-arm64 install'
            echo 'kiroctl config set-user <name> --server=<HOST:PORT> --server-key=<PSK> --psk=<PSK>'
            echo 'sudo kiroctl enable'
            echo 'kiroctl status'
            echo '```'
            echo
            echo "### Windows (x64, PowerShell)"
            echo
            echo '```powershell'
            echo "Invoke-WebRequest -Uri https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/kiroctl-windows-amd64.exe -OutFile kiroctl-windows-amd64.exe"
            echo '.\kiroctl-windows-amd64.exe install'
            echo '# Close this PowerShell, open a new one so the updated PATH takes effect.'
            echo 'kiroctl config set-user <name> --server=<HOST:PORT> --server-key=<PSK> --psk=<PSK>'
            echo 'kiroctl enable'
            echo 'kiroctl status'
            echo '```'
            echo
            echo "SmartScreen may prompt on first run — click **More info → Run anyway**."
            echo
            echo "## Verify"
            echo
            echo '```bash'
            echo "curl -LO https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/checksums.txt"
            echo 'sha256sum -c checksums.txt'
            echo '```'
            echo
            echo "## What's changed"
            echo

            FEAT=$(group '^- feat(\(|:)')
            [[ -n "$FEAT" ]] && { echo "### Features"; echo "$FEAT"; echo; }

            FIX=$(group '^- fix(\(|:)')
            [[ -n "$FIX" ]] && { echo "### Fixes"; echo "$FIX"; echo; }

            DOCS=$(group '^- docs(\(|:)')
            [[ -n "$DOCS" ]] && { echo "### Documentation"; echo "$DOCS"; echo; }

            CI=$(group '^- (ci|build|chore)(\(|:)')
            [[ -n "$CI" ]] && { echo "### CI & Chores"; echo "$CI"; echo; }

            OTHER=$(git log --no-merges --pretty=format:'- %s (%h)' "$RANGE" \
              | grep -Ev '^- (feat|fix|docs|ci|build|chore)(\(|:)' || true)
            [[ -n "$OTHER" ]] && { echo "### Other"; echo "$OTHER"; echo; }

            echo "## Checksums"
            echo
            echo '```'
            cat dist/checksums.txt
            echo '```'
            echo
            if [[ -n "$PREV_TAG" ]]; then
              echo "**Full changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${TAG}"
            fi
          } > /tmp/release-notes.md

          echo "---notes---"
          cat /tmp/release-notes.md
          echo "---/notes---"

      # If this tag's release already exists (e.g., re-running after a failed
      # asset upload), we overwrite assets via `gh release upload --clobber`.
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists — refreshing notes + assets."
            gh release edit "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --notes-file /tmp/release-notes.md
            gh release upload "$TAG" \
              dist/kiroctl-darwin-arm64 \
              dist/kiroctl-windows-amd64.exe \
              dist/checksums.txt \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
            exit 0
          fi

          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --notes-file /tmp/release-notes.md \
            dist/kiroctl-darwin-arm64 \
            dist/kiroctl-windows-amd64.exe \
            dist/checksums.txt
